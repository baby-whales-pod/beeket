config_version = "0"

# Exclude generated, vendored, and test-fixture paths.
exclude_patterns = [
  "**/vendor/**",
  "**/testdata/**",
  "**/dist/**",
  "**/generated/**"
]

# Mark Go test files so qlty reports them separately from application code.
test_patterns = [
  "**/*_test.go"
]

[[source]]
name    = "default"
default = true

# --- Linters ---

[[plugin]]
name    = "golangci-lint"
version = "2.6.2"

# --- Security scanning ---

[[plugin]]
name    = "osv-scanner"   # dependency vulnerability (SCA)
version = "2.0.3"

[[plugin]]
name    = "trufflehog"       # secrets / credential detection
version = "3.82.12"

# ---------------------------------------------------------------------------
# Triage: CVE in golang.org/x/sys — no compatible upgrade available within
# the go 1.24 toolchain. All x/sys versions >= v0.42.0 require go >= 1.25.
# This will be resolved when the project upgrades to Go 1.25.
[[triage]]
# golang.org/x/sys CVE-2026-39824: x/sys v0.42+ requires go 1.25,
# which is not yet released. Suppressed until go 1.25 is available.
match.rules = ["osv-scanner:CVE-2026-39824"]
set.ignored  = true
